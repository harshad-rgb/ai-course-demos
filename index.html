<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Course Demos</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
        Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
      color: #f8fafc;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ---------- Home view ---------- */
    #home {
      min-height: 100vh;
      padding: 48px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .hero {
      text-align: center;
      max-width: 820px;
      margin-bottom: 48px;
    }

    .hero .badge {
      display: inline-block;
      padding: 6px 14px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 999px;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #cbd5e1;
      margin-bottom: 20px;
      background: rgba(30, 41, 59, 0.55);
    }

    .hero h1 {
      font-size: clamp(2rem, 4.5vw, 3.25rem);
      font-weight: 800;
      line-height: 1.15;
      background: linear-gradient(90deg, #38bdf8, #a855f7, #f472b6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 16px;
    }

    .hero p {
      font-size: 1.05rem;
      color: #cbd5e1;
      line-height: 1.6;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 1100px;
    }

    .card {
      position: relative;
      background: rgba(15, 23, 42, 0.65);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 18px;
      padding: 28px 24px;
      text-align: left;
      cursor: pointer;
      transition: transform 0.25s ease, border-color 0.25s ease,
        box-shadow 0.25s ease, background 0.25s ease;
      overflow: hidden;
      color: inherit;
      font: inherit;
      width: 100%;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(
        600px circle at var(--x, 50%) var(--y, 50%),
        rgba(56, 189, 248, 0.12),
        transparent 40%
      );
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(56, 189, 248, 0.5);
      box-shadow: 0 20px 40px -20px rgba(56, 189, 248, 0.35);
      background: rgba(15, 23, 42, 0.85);
    }

    .card:hover::before { opacity: 1; }

    .card .icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #38bdf8, #8b5cf6);
    }

    .card h3 {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #f8fafc;
    }

    .card p {
      font-size: 0.9rem;
      color: #94a3b8;
      line-height: 1.5;
    }

    .card .cta {
      margin-top: 18px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #38bdf8;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .card:hover .cta { color: #7dd3fc; }

    footer {
      margin-top: 56px;
      font-size: 0.8rem;
      color: #64748b;
      text-align: center;
    }

    /* ---------- Viewer view ---------- */
    #viewer {
      display: none;
      position: fixed;
      inset: 0;
      background: #0f172a;
      z-index: 10;
      flex-direction: column;
    }

    #viewer.active { display: flex; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: rgba(15, 23, 42, 0.95);
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
      backdrop-filter: blur(8px);
      flex-shrink: 0;
    }

    .topbar .title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #e2e8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 60vw;
    }

    .topbar button {
      background: linear-gradient(135deg, #38bdf8, #8b5cf6);
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.85rem;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .topbar button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px -10px rgba(139, 92, 246, 0.6);
    }

    iframe {
      flex: 1;
      width: 100%;
      border: none;
      background: #fff;
    }

    @media (max-width: 640px) {
      #home { padding: 32px 16px; }
      .topbar .title { max-width: 50vw; font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <main id="home">
    <div class="hero">
      <span class="badge">Interactive Learning Demos</span>
      <h1>AI-Powered Course Previews</h1>
      <p>
        A collection of interactive demo modules built by ConveGenius AI. Pick a
        course below to explore. Refresh the page anytime to come back here.
      </p>
    </div>

    <div class="grid" id="cards"></div>

    <footer>Built with Claude &middot; Hosted on GitHub Pages</footer>
  </main>

  <section id="viewer" aria-hidden="true">
    <div class="topbar">
      <span class="title" id="viewerTitle"></span>
      <button id="backBtn" type="button">&larr; Back to Home</button>
    </div>
    <iframe id="frame" title="Demo viewer" allow="fullscreen"></iframe>
  </section>

  <script>
    const demos = [
      {
        title: "AI for Computer Science 1",
        desc: "Foundational concepts of AI applied to core computer science topics.",
        icon: "💻",
        file: "AI for Computer science 1.html",
      },
      {
        title: "AI for Computer Science 2",
        desc: "Advanced AI applications in computer science and software engineering.",
        icon: "🧠",
        file: "AI for computer science 2.html",
      },
      {
        title: "AI for Data Analytics",
        desc: "Using AI to explore, clean, and draw insights from real-world data.",
        icon: "📊",
        file: "AI for Data Analytics.html",
      },
      {
        title: "AI for Digital Marketing",
        desc: "Applying AI to campaigns, content, audience targeting, and SEO.",
        icon: "📣",
        file: "AI for Digital Marketing.html",
      },
      {
        title: "AI for Mechanical Engineering",
        desc: "AI-driven design, simulation, and optimization for mechanical systems.",
        icon: "⚙️",
        file: "AI for mechanical Engineering.html",
      },
    ];

    const cards = document.getElementById("cards");
    const home = document.getElementById("home");
    const viewer = document.getElementById("viewer");
    const frame = document.getElementById("frame");
    const viewerTitle = document.getElementById("viewerTitle");
    const backBtn = document.getElementById("backBtn");

    demos.forEach((d) => {
      const btn = document.createElement("button");
      btn.className = "card";
      btn.type = "button";
      btn.innerHTML = `
        <div class="icon">${d.icon}</div>
        <h3></h3>
        <p></p>
        <span class="cta">Launch demo →</span>
      `;
      btn.querySelector("h3").textContent = d.title;
      btn.querySelector("p").textContent = d.desc;

      btn.addEventListener("mousemove", (e) => {
        const rect = btn.getBoundingClientRect();
        btn.style.setProperty("--x", `${e.clientX - rect.left}px`);
        btn.style.setProperty("--y", `${e.clientY - rect.top}px`);
      });

      btn.addEventListener("click", () => openDemo(d));
      cards.appendChild(btn);
    });

    function openDemo(d) {
      viewerTitle.textContent = d.title;
      frame.src = encodeURI(d.file);
      viewer.classList.add("active");
      viewer.setAttribute("aria-hidden", "false");
      home.style.display = "none";
      window.scrollTo(0, 0);
    }

    function goHome() {
      viewer.classList.remove("active");
      viewer.setAttribute("aria-hidden", "true");
      frame.src = "about:blank";
      home.style.display = "flex";
    }

    backBtn.addEventListener("click", goHome);
  </script>
</body>
</html>
